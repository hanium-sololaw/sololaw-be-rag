services:
  app:
    image: ${DOCKER_USERNAME}/${DOCKER_REPO}:${DOCKER_TAG:-latest}
    container_name: sololaw-be-rag
    ports:
      - "18000:8000"
    environment:
      APP_NAME: ${APP_NAME:-sololaw-be-rag}
      ENV: ${ENV:-dev}
      TZ: Asia/Seoul

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - sololaw-network
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  sololaw-network:
    external: true
